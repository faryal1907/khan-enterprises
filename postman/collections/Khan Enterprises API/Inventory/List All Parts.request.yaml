$kind: http-request
name: List All Parts
method: GET
url: '{{baseUrl}}/api/inventory/parts'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array of parts", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("Each part has required fields", () => {
        const parts = pm.response.json();
        if (parts.length > 0) {
          const part = parts[0];
          pm.expect(part).to.have.property("id");
          pm.expect(part).to.have.property("name");
          // Save first productId for downstream requests
          pm.environment.set("productId", part.id);
        }
      });

      pm.test("Part quantities are non-negative numbers", () => {
        const parts = pm.response.json();
        parts.forEach((part) => {
          if (part.quantity !== undefined) {
            pm.expect(part.quantity).to.be.a("number");
            pm.expect(part.quantity).to.be.at.least(0);
          }
        });
      });

      pm.test("Response time is under 2000ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
