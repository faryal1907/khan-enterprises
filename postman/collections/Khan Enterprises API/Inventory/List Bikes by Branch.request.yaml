$kind: http-request
name: List Bikes by Branch
method: GET
url: '{{baseUrl}}/api/inventory/bikes?branchId={{branchId}}'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response is an array", () => {
        const json = pm.response.json();
        pm.expect(json).to.be.an("array");
      });

      pm.test("All returned bikes belong to the requested branch", () => {
        const bikes = pm.response.json();
        const requestedBranchId = pm.environment.get("branchId");
        if (bikes.length > 0 && requestedBranchId) {
          bikes.forEach((bike) => {
            if (bike.branchId !== undefined) {
              pm.expect(String(bike.branchId)).to.equal(String(requestedBranchId));
            }
          });
        }
      });

      pm.test("Bike statuses are valid enum values", () => {
        const bikes = pm.response.json();
        const validStatuses = ["AVAILABLE", "RESERVED", "SOLD", "IN_DELIVERY"];
        bikes.forEach((bike) => {
          if (bike.status) {
            pm.expect(validStatuses).to.include(bike.status);
          }
        });
      });

      pm.test("Response time is under 2000ms", () => {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
