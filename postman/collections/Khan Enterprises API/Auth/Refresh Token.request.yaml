$kind: http-request
name: Refresh Token
method: POST
url: '{{baseUrl}}/api/auth/refresh'
order: 5000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response has new accessToken", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("accessToken");
        pm.expect(json.accessToken).to.be.a("string").and.not.empty;
      });

      pm.test("Response has new refreshToken", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("refreshToken");
        pm.expect(json.refreshToken).to.be.a("string").and.not.empty;
      });

      pm.test("Refresh token is rotated (single-use)", () => {
        const json = pm.response.json();
        const oldRefresh = pm.environment.get("refreshToken");
        pm.expect(json.refreshToken).to.not.equal(oldRefresh);
      });

      pm.test("Response includes accessToken", () => {
        const json = pm.response.json();
        pm.expect(json.accessToken).to.be.a("string").and.not.empty;
      });

      // ── Rotate tokens in environment ───────────────────────────────────────────
      const json = pm.response.json();
      if (json.accessToken) {
        pm.environment.set("accessToken", json.accessToken);
      }
      if (json.refreshToken) {
        pm.environment.set("refreshToken", json.refreshToken);
      }
