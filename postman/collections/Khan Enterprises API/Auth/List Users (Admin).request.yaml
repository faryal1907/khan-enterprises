$kind: http-request
name: 'List Users (Admin)'
method: GET
url: '{{baseUrl}}/api/auth/users'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 OK", () => {
        pm.response.to.have.status(200);
      });

      pm.test("Response has users array", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("users");
        pm.expect(json.users).to.be.an("array");
      });

      pm.test("Response has count field", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("count");
        pm.expect(json.count).to.be.a("number");
        pm.expect(json.count).to.equal(json.users.length);
      });

      pm.test("Users do not expose passwordHash", () => {
        const { users } = pm.response.json();
        users.forEach(user => {
          pm.expect(user).to.not.have.property("passwordHash");
        });
      });

      pm.test("Each user has required fields", () => {
        const { users } = pm.response.json();
        users.forEach(user => {
          pm.expect(user).to.have.property("id");
          pm.expect(user).to.have.property("email");
          pm.expect(user).to.have.property("role");
          pm.expect(user).to.have.property("status");
        });
      });
